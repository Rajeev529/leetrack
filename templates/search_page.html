<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Directory | LeetTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        /* High-density grid for mobile */
        @media (max-width: 640px) {
            .company-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .company-card { padding: 12px !important; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    
    <nav class="sticky top-0 z-50 glass px-6 py-4 flex items-center justify-between border-b border-slate-800">
        <div class="flex items-center gap-2">
            <a href="/" class="bg-blue-600 p-1.5 rounded-lg font-bold text-white">LT</a>
            <span class="text-xl font-bold tracking-tight">LeetTracker</span>
        </div>
        <img src="https://ui-avatars.com/api/?name=User&background=3b82f6&color=fff" class="w-8 h-8 rounded-full">
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10 w-full">
        <div class="mb-12 text-center">
            <h1 class="text-4xl font-black mb-4">Search Companies</h1>
            <div class="relative max-w-2xl mx-auto">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="companySearch" onkeyup="filterCompanies()" placeholder="Type company name (e.g. Google, NVIDIA, Zoho)..." 
                class="w-full bg-slate-900 border border-slate-700 rounded-2xl py-4 pl-12 pr-4 text-lg focus:outline-none focus:border-blue-500 transition-all shadow-2xl">
            </div>
        </div>

        <div id="companyGrid" class="company-grid grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>

<script>
    const grid = document.getElementById('companyGrid');

    fetch('/api/companies/')
        .then(res => res.json())
        .then(data => {
            data.companies.forEach(company => {
                grid.insertAdjacentHTML('beforeend', `
                <a href="/question/${encodeURIComponent(company.name)}">
                    <div class="company-card glass p-6 rounded-2xl flex flex-col items-center justify-center text-center hover:border-blue-500 hover:bg-slate-800 transition-all cursor-pointer group">
                        <img src="${company.logo}" alt="${company.name}" class="h-8 mb-4 object-contain group-hover:scale-110 transition-transform">
                        <h3 class="font-bold text-sm tracking-wide">${company.name}</h3>
                    </div>
                </a>
                `);
            });
        })
        .catch(err => console.error("API error:", err));

            function filterCompanies() {
            const input = document.getElementById('companySearch').value.toLowerCase();
            const cards = document.getElementsByClassName('company-card');
            
            Array.from(cards).forEach(card => {
                const name = card.querySelector('h3').innerText.toLowerCase();
                const parentLink = card.closest('a'); // get <a> wrapper
                
                if (name.includes(input)) {
                    parentLink.style.display = "block"; // or "" to reset
                } else {
                    parentLink.style.display = "none";
                }
            });
        }
</script>
    </main>

    <footer class="mt-auto py-6 text-center text-slate-500 text-xs">
        © 2026 LeetTracker • All curated companies
    </footer>

</body>
</html>
